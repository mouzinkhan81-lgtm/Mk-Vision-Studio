<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MK Vision Studio</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            background: linear-gradient(to right, rgba(240, 248, 255, 0.8), rgba(255, 255, 255, 0.8));
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            backdrop-filter: blur(10px);
        }
        .container {
            background: rgba(255, 255, 255, 0.9);
            border-radius: 15px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
            padding: 30px;
            text-align: center;
            transition: transform 0.3s, box-shadow 0.3s;
            width: 90%;
            max-width: 600px;
        }
        .container:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 50px rgba(0, 0, 0, 0.15);
        }
        h1 {
            color: #333;
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 1px 1px rgba(255, 255, 255, 0.7);
        }
        p {
            color: #555;
            line-height: 1.6;
            font-weight: 400;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Welcome to MK Vision Studio</h1>
        <p>Explore our innovative solutions and modern designs.</p>
    </div>
</body>
</html>
