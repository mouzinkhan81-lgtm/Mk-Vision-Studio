<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Dashboard - Real-time Weather Forecast</title>
    <meta name="description" content="Advanced weather dashboard with real-time forecasts, hourly data, and detailed weather analytics">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Sora:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #FF6B6B;
            --primary-light: #FF8787;
            --secondary: #4ECDC4;
            --accent: #FFE66D;
            --dark: #0F1419;
            --darker: #05080B;
            --light: #FFFFFF;
            --gray: #A0A0A0;
            --gray-dark: #6B7280;
            --border: #1A1D2E;
            --success: #52C77E;
            --warning: #FF9F43;
            --danger: #EE5A6F;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, var(--darker) 0%, #0A0D11 100%);
            color: var(--light);
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* ===== HEADER ===== */
        header {
            background: rgba(5, 8, 11, 0.7);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding: 20px 40px;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-container {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-family: 'Sora', sans-serif;
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, #FF6B6B, #4ECDC4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .search-container {
            display: flex;
            gap: 10px;
            flex: 1;
            max-width: 400px;
            margin: 0 40px;
        }

        .search-input {
            flex: 1;
            padding: 12px 20px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: var(--light);
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .search-input::placeholder {
            color: var(--gray-dark);
        }

        .search-input:focus {
            outline: none;
            background: rgba(255, 255, 255, 0.12);
            border-color: var(--primary);
            box-shadow: 0 0 20px rgba(255, 107, 107, 0.2);
        }

        .search-btn {
            padding: 12px 24px;
            background: linear-gradient(135deg, #FF6B6B, #FF8787);
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .search-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(255, 107, 107, 0.3);
        }

        .header-icons {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .icon-btn {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--light);
            cursor: pointer;
            font-size: 20px;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .icon-btn:hover {
            background: rgba(255, 107, 107, 0.2);
            border-color: var(--primary);
            transform: translateY(-2px);
        }

        /* ===== MAIN CONTAINER ===== */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        /* ===== CURRENT WEATHER SECTION ===== */
        .current-weather {
            background: linear-gradient(135deg, rgba(255, 107, 107, 0.15), rgba(78, 205, 196, 0.15));
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px;
            margin-bottom: 40px;
            position: relative;
            overflow: hidden;
        }

        .current-weather::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(255, 107, 107, 0.1) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
        }

        .weather-content {
            position: relative;
            z-index: 1;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 60px;
            align-items: center;
        }

        .weather-left {
            display: flex;
            align-items: center;
            gap: 30px;
        }

        .weather-icon {
            font-size: 120px;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        .weather-info h1 {
            font-size: 72px;
            font-weight: 800;
            margin-bottom: 10px;
            font-family: 'Sora', sans-serif;
        }

        .weather-location {
            font-size: 20px;
            color: var(--gray);
            margin-bottom: 20px;
            font-weight: 600;
        }

        .weather-description {
            font-size: 18px;
            color: var(--light);
            margin-bottom: 10px;
            text-transform: capitalize;
        }

        .weather-feels {
            font-size: 16px;
            color: var(--gray);
        }

        .weather-right {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }

        .weather-stat {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 24px;
            text-align: center;
            transition: all 0.3s ease;
        }

        .weather-stat:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--primary);
            transform: translateY(-8px);
        }

        .stat-value {
            font-size: 32px;
            font-weight: 800;
            margin-bottom: 8px;
            font-family: 'Sora', sans-serif;
        }

        .stat-label {
            font-size: 13px;
            color: var(--gray);
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }

        /* ===== HOURLY FORECAST ===== */
        .section-title {
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 24px;
            font-family: 'Sora', sans-serif;
        }

        .hourly-forecast {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 40px;
            overflow-x: auto;
        }

        .hourly-container {
            display: flex;
            gap: 20px;
            min-width: 100%;
            padding-bottom: 10px;
        }

        .hourly-item {
            flex: 0 0 auto;
            width: 140px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            transition: all 0.3s ease;
        }

        .hourly-item:hover {
            background: rgba(255, 107, 107, 0.15);
            border-color: var(--primary);
            transform: translateY(-10px);
        }

        .hourly-time {
            font-size: 14px;
            color: var(--gray);
            margin-bottom: 12px;
            font-weight: 600;
        }

        .hourly-icon {
            font-size: 40px;
            margin-bottom: 12px;
        }

        .hourly-temp {
            font-size: 18px;
            font-weight: 800;
            margin-bottom: 8px;
        }

        .hourly-rain {
            font-size: 12px;
            color: var(--secondary);
        }

        /* ===== 5 DAY FORECAST ===== */
        .forecast-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .forecast-card {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.03));
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 24px;
            text-align: center;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .forecast-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .forecast-card:hover {
            background: linear-gradient(135deg, rgba(255, 107, 107, 0.15), rgba(78, 205, 196, 0.15));
            border-color: var(--primary);
            transform: translateY(-12px);
        }

        .forecast-card:hover::before {
            opacity: 1;
        }

        .forecast-day {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 16px;
            color: var(--light);
        }

        .forecast-icon {
            font-size: 48px;
            margin: 16px 0;
        }

        .forecast-temps {
            display: flex;
            justify-content: center;
            gap: 16px;
            margin-bottom: 12px;
        }

        .forecast-high {
            font-size: 18px;
            font-weight: 800;
            color: var(--light);
        }

        .forecast-low {
            font-size: 18px;
            font-weight: 800;
            color: var(--gray);
        }

        .forecast-desc {
            font-size: 13px;
            color: var(--gray);
            text-transform: capitalize;
            margin-top: 12px;
        }

        /* ===== DETAILS SECTION ===== */
        .details-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .detail-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 24px;
            transition: all 0.3s ease;
        }

        .detail-card:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--primary);
            transform: translateY(-8px);
        }

        .detail-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }

        .detail-icon {
            font-size: 28px;
        }

        .detail-title {
            font-size: 14px;
            font-weight: 700;
            color: var(--gray);
            text-transform: uppercase;
            letter-spacing: 0.8px;
        }

        .detail-value {
            font-size: 32px;
            font-weight: 800;
            margin-bottom: 8px;
            font-family: 'Sora', sans-serif;
        }

        .detail-unit {
            font-size: 13px;
            color: var(--gray);
        }

        /* ===== PROGRESS BARS ===== */
        .progress-bar {
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            overflow: hidden;
            margin-top: 12px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            border-radius: 10px;
            transition: width 0.5s ease;
        }

        /* ===== LOADING STATE ===== */
        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 400px;
            gap: 15px;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ===== ERROR STATE ===== */
        .error {
            background: rgba(255, 107, 107, 0.15);
            border: 1px solid var(--primary);
            border-radius: 16px;
            padding: 30px;
            text-align: center;
            margin-bottom: 40px;
        }

        .error-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }

        .error-title {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .error-msg {
            font-size: 15px;
            color: var(--gray);
            margin-bottom: 20px;
        }

        .retry-btn {
            padding: 12px 30px;
            background: linear-gradient(135deg, #FF6B6B, #FF8787);
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .retry-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(255, 107, 107, 0.3);
        }

        /* ===== FOOTER ===== */
        footer {
            background: rgba(255, 255, 255, 0.02);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding: 40px 20px;
            text-align: center;
            color: var(--gray);
            font-size: 14px;
            margin-top: 60px;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 1024px) {
            .header-container {
                padding: 0 20px;
                flex-wrap: wrap;
                gap: 20px;
            }

            .search-container {
                max-width: none;
                flex: 1;
                order: 3;
                margin: 0;
            }

            .weather-content {
                grid-template-columns: 1fr;
                gap: 30px;
            }

            .weather-right {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 768px) {
            .container {
                padding: 20px 15px;
            }

            .header-container {
                padding: 12px 20px;
            }

            .logo {
                font-size: 22px;
            }

            .search-container {
                max-width: none;
            }

            .current-weather {
                padding: 24px;
            }

            .weather-content {
                grid-template-columns: 1fr;
                gap: 30px;
            }

            .weather-icon {
                font-size: 80px;
            }

            .weather-info h1 {
                font-size: 48px;
            }

            .weather-right {
                grid-template-columns: repeat(2, 1fr);
                gap: 12px;
            }

            .weather-stat {
                padding: 16px;
            }

            .stat-value {
                font-size: 24px;
            }

            .hourly-container {
                overflow-x: auto;
                -webkit-overflow-scrolling: touch;
            }

            .hourly-item {
                width: 120px;
                padding: 16px 12px;
            }

            .forecast-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .details-grid {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 480px) {
            header {
                padding: 16px 20px;
            }

            .header-container {
                flex-direction: column;
                gap: 12px;
            }

            .search-container {
                width: 100%;
                order: 2;
                margin: 0;
            }

            .header-icons {
                order: 3;
            }

            .weather-info h1 {
                font-size: 40px;
            }

            .weather-stat {
                padding: 12px;
            }

            .stat-value {
                font-size: 20px;
            }

            .section-title {
                font-size: 22px;
            }

            .forecast-grid {
                grid-template-columns: 1fr;
            }

            .hourly-item {
                width: 100px;
                padding: 12px;
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header>
        <div class="header-container">
            <div class="logo">🌤️ Weather Dashboard</div>
            <div class="search-container">
                <input 
                    type="text" 
                    class="search-input" 
                    id="cityInput" 
                    placeholder="Search city..."
                >
                <button class="search-btn" onclick="searchWeather()">Search</button>
            </div>
            <div class="header-icons">
                <button class="icon-btn" onclick="getCurrentLocation()" title="Use Current Location">📍</button>
                <button class="icon-btn" onclick="toggleFahrenheit()" title="Toggle °C/°F">°C</button>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <div class="container">
        <!-- Current Weather -->
        <div id="weatherContainer">
            <div class="loading">
                <div class="spinner"></div>
                <span>Loading weather data...</span>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer>
        <p>🌍 Real-time weather data powered by OpenWeatherMap API | Last updated: <span id="lastUpdate">--:--</span></p>
    </footer>

    <script>
        const API_KEY = 'a6d8fb5e994842a68fa141612241706'; // Using Open-Meteo (free, no key needed) or WeatherAPI
        const WEATHER_API = 'https://api.weatherapi.com/v1'; // Using WeatherAPI.com free tier
        
        let isFahrenheit = false;
        let currentCity = 'London';
        let currentWeatherData = null;
        let currentForecastData = null;

        // Initialize on page load
        document.addEventListener('DOMContentLoaded', () => {
            fetchWeatherByCity('London');
            setInterval(updateLastUpdate, 60000);
            updateLastUpdate();
        });

        // Update last update time
        function updateLastUpdate() {
            const now = new Date();
            const time = now.toLocaleTimeString('en-US', { 
                hour: '2-digit', 
                minute: '2-digit'
            });
            document.getElementById('lastUpdate').textContent = time;
        }

        // Fetch weather by city name
        async function fetchWeatherByCity(city) {
            try {
                showLoading();
                
                // Using WeatherAPI.com (free tier)
                const response = await fetch(
                    `${WEATHER_API}/forecast.json?key=${API_KEY}&q=${city}&days=5&aqi=yes`
                );
                
                if (!response.ok) {
                    throw new Error('City not found');
                }
                
                const data = await response.json();
                currentCity = data.location.name;
                currentWeatherData = data.current;
                currentForecastData = data.forecast;
                
                displayWeather(data);
            } catch (error) {
                showError(error.message);
            }
        }

        // Get current location weather
        async function getCurrentLocation() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    position => {
                        const { latitude, longitude } = position.coords;
                        fetchWeatherByCoords(latitude, longitude);
                    },
                    error => showError('Location access denied')
                );
            } else {
                showError('Geolocation not supported');
            }
        }

        // Fetch weather by coordinates
        async function fetchWeatherByCoords(lat, lon) {
            try {
                showLoading();
                
                const response = await fetch(
                    `${WEATHER_API}/forecast.json?key=${API_KEY}&q=${lat},${lon}&days=5&aqi=yes`
                );
                
                if (!response.ok) throw new Error('Could not fetch weather');
                
                const data = await response.json();
                currentCity = data.location.name;
                currentWeatherData = data.current;
                currentForecastData = data.forecast;
                
                displayWeather(data);
            } catch (error) {
                showError(error.message);
            }
        }

        // Display weather data
        function displayWeather(data) {
            const location = data.location;
            const current = data.current;
            const forecast = data.forecast;
            
            const temp = isFahrenheit ? 
                Math.round(current.temp_f) : 
                Math.round(current.temp_c);
            
            const feelsLike = isFahrenheit ?
                Math.round(current.feelslike_f) :
                Math.round(current.feelslike_c);

            let html = `
                <div class="current-weather">
                    <div class="weather-content">
                        <div class="weather-left">
                            <div class="weather-icon">${getWeatherIcon(current.condition.code, current.is_day)}</div>
                            <div class="weather-info">
                                <h1>${temp}°</h1>
                                <div class="weather-location">
                                    📍 ${location.name}, ${location.country}
                                </div>
                                <div class="weather-description">${current.condition.text}</div>
                                <div class="weather-feels">Feels like ${feelsLike}°</div>
                            </div>
                        </div>
                        <div class="weather-right">
                            <div class="weather-stat">
                                <div class="stat-value">${current.humidity}%</div>
                                <div class="stat-label">Humidity</div>
                            </div>
                            <div class="weather-stat">
                                <div class="stat-value">${current.wind_kph} km/h</div>
                                <div class="stat-label">Wind Speed</div>
                            </div>
                            <div class="weather-stat">
                                <div class="stat-value">${current.pressure_mb} mb</div>
                                <div class="stat-label">Pressure</div>
                            </div>
                            <div class="weather-stat">
                                <div class="stat-value">${current.uv_index}</div>
                                <div class="stat-label">UV Index</div>
                            </div>
                        </div>
                    </div>
                </div>

                <h2 class="section-title">⏰ Hourly Forecast</h2>
                <div class="hourly-forecast">
                    <div class="hourly-container">
                        ${forecast.forecastday[0].hour
                            .filter((h, i) => i % 3 === 0)
                            .slice(0, 8)
                            .map(hour => {
                                const time = new Date(hour.time).toLocaleTimeString('en-US', { 
                                    hour: '2-digit', 
                                    minute: '2-digit'
                                });
                                const hourTemp = isFahrenheit ? 
                                    Math.round(hour.temp_f) : 
                                    Math.round(hour.temp_c);
                                return `
                                    <div class="hourly-item">
                                        <div class="hourly-time">${time}</div>
                                        <div class="hourly-icon">${getWeatherIcon(hour.condition.code, hour.is_day)}</div>
                                        <div class="hourly-temp">${hourTemp}°</div>
                                        <div class="hourly-rain">💧 ${hour.chance_of_rain}%</div>
                                    </div>
                                `;
                            }).join('')}
                    </div>
                </div>

                <h2 class="section-title">📅 5-Day Forecast</h2>
                <div class="forecast-grid">
                    ${forecast.forecastday.map((day, index) => {
                        const date = new Date(day.date);
                        const dayName = index === 0 ? 'Today' : 
                                       index === 1 ? 'Tomorrow' :
                                       date.toLocaleDateString('en-US', { weekday: 'short' });
                        
                        const maxTemp = isFahrenheit ? 
                            Math.round(day.day.maxtemp_f) : 
                            Math.round(day.day.maxtemp_c);
                        
                        const minTemp = isFahrenheit ? 
                            Math.round(day.day.mintemp_f) : 
                            Math.round(day.day.mintemp_c);

                        return `
                            <div class="forecast-card">
                                <div class="forecast-day">${dayName}</div>
                                <div class="forecast-icon">${getWeatherIcon(day.day.condition.code, true)}</div>
                                <div class="forecast-temps">
                                    <span class="forecast-high">${maxTemp}°</span>
                                    <span class="forecast-low">${minTemp}°</span>
                                </div>
                                <div class="forecast-desc">${day.day.condition.text}</div>
                            </div>
                        `;
                    }).join('')}
                </div>

                <h2 class="section-title">📊 Weather Details</h2>
                <div class="details-grid">
                    <div class="detail-card">
                        <div class="detail-header">
                            <div class="detail-icon">💨</div>
                            <div class="detail-title">Wind</div>
                        </div>
                        <div class="detail-value">${current.wind_kph}</div>
                        <div class="detail-unit">km/h | ${current.wind_degree}° ${getWindDirection(current.wind_degree)}</div>
                        <div class="progress-bar">
                            <div class="progress-fill" style="width: ${Math.min(current.wind_kph, 100)}%"></div>
                        </div>
                    </div>

                    <div class="detail-card">
                        <div class="detail-header">
                            <div class="detail-icon">💧</div>
                            <div class="detail-title">Humidity</div>
                        </div>
                        <div class="detail-value">${current.humidity}%</div>
                        <div class="detail-unit">Dew point: ${Math.round(current.dewpoint_c)}°C</div>
                        <div class="progress-bar">
                            <div class="progress-fill" style="width: ${current.humidity}%"></div>
                        </div>
                    </div>

                    <div class="detail-card">
                        <div class="detail-header">
                            <div class="detail-icon">🌡️</div>
                            <div class="detail-title">Visibility</div>
                        </div>
                        <div class="detail-value">${current.vis_km}</div>
                        <div class="detail-unit">km</div>
                        <div class="progress-bar">
                            <div class="progress-fill" style="width: ${Math.min(current.vis_km, 100)}%"></div>
                        </div>
                    </div>

                    <div class="detail-card">
                        <div class="detail-header">
                            <div class="detail-icon">🔬</div>
                            <div class="detail-title">Pressure</div>
                        </div>
                        <div class="detail-value">${current.pressure_mb}</div>
                        <div class="detail-unit">millibar</div>
                    </div>

                    <div class="detail-card">
                        <div class="detail-header">
                            <div class="detail-icon">☀️</div>
                            <div class="detail-title">UV Index</div>
                        </div>
                        <div class="detail-value">${current.uv_index}</div>
                        <div class="detail-unit">${getUVRisk(current.uv_index)}</div>
                    </div>

                    <div class="detail-card">
                        <div class="detail-header">
                            <div class="detail-icon">🌧️</div>
                            <div class="detail-title">Precipitation</div>
                        </div>
                        <div class="detail-value">${forecast.forecastday[0].day.totalprecip_mm}</div>
                        <div class="detail-unit">mm | ${forecast.forecastday[0].day.daily_chance_of_rain}% chance</div>
                    </div>
                </div>
            `;

            document.getElementById('weatherContainer').innerHTML = html;
        }

        // Get wind direction
        function getWindDirection(degree) {
            const directions = ['N', 'NNE', 'NE', 'ENE', 'E', 'ESE', 'SE', 'SSE', 
                              'S', 'SSW', 'SW', 'WSW', 'W', 'WNW', 'NW', 'NNW'];
            const index = Math.round(degree / 22.5) % 16;
            return directions[index];
        }

        // Get UV risk level
        function getUVRisk(index) {
            if (index < 3) return '🟢 Low';
            if (index < 6) return '🟡 Moderate';
            if (index < 8) return '🟠 High';
            if (index < 11) return '🔴 Very High';
            return '🟣 Extreme';
        }

        // Search weather
        function searchWeather() {
            const city = document.getElementById('cityInput').value.trim();
            if (city) {
                fetchWeatherByCity(city);
                document.getElementById('cityInput').value = '';
            }
        }

        // Search on Enter key
        document.getElementById('cityInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') searchWeather();
        });

        // Toggle Fahrenheit/Celsius
        function toggleFahrenheit() {
            isFahrenheit = !isFahrenheit;
            document.querySelector('.icon-btn:nth-child(2)').textContent = isFahrenheit ? '°F' : '°C';
            
            if (currentWeatherData && currentForecastData) {
                displayWeather({
                    location: {
                        name: currentCity,
                        country: document.querySelector('.weather-location').textContent.split(',')[1].trim().split(' ')[0]
                    },
                    current: currentWeatherData,
                    forecast: currentForecastData
                });
            }
        }

        // Show loading state
        function showLoading() {
            document.getElementById('weatherContainer').innerHTML = `
                <div class="loading">
                    <div class="spinner"></div>
                    <span>Loading weather data...</span>
                </div>
            `;
        }

        // Show error state
        function showError(message) {
            document.getElementById('weatherContainer').innerHTML = `
                <div class="error">
                    <div class="error-icon">❌</div>
                    <div class="error-title">Unable to Load Weather</div>
                    <div class="error-msg">${message}</div>
                    <button class="retry-btn" onclick="fetchWeatherByCity('London')">Try Again</button>
                </div>
            `;
        }
    </script>
</body>
</html>
